<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Reactions Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #e5e5e5;
            --text-secondary: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Period Switcher */
        .switcher {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            gap: 2px;
        }

        .switcher button {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .switcher button:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .switcher button.active {
            background: var(--accent);
            color: #fff;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-box {
            flex: 1;
            max-width: 320px;
            position: relative;
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .period-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            margin-left: auto;
        }

        /* Table */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: var(--surface);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: color 0.15s;
        }

        th:hover {
            color: var(--text);
        }

        th .sort-icon {
            opacity: 0.3;
            margin-left: 4px;
            font-size: 0.7em;
        }

        th.sort-asc .sort-icon,
        th.sort-desc .sort-icon {
            opacity: 1;
            color: var(--accent);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: var(--surface-hover);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .col-rank {
            color: var(--text-secondary);
            font-size: 0.75rem;
            width: 40px;
            text-align: center;
        }

        .col-name {
            font-weight: 500;
            min-width: 140px;
        }

        .col-number {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .col-rate {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            font-weight: 500;
        }

        .col-emoji {
            text-align: center;
            font-size: 1rem;
        }

        .zero {
            color: #333;
        }

        .heat-1 { color: #666; }
        .heat-2 { color: #f59e0b; }
        .heat-3 { color: #f97316; }
        .heat-4 { color: #ef4444; font-weight: 600; }

        /* Loading / Error */
        .status-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .status-message.error {
            color: #ef4444;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }

            .header { flex-direction: column; align-items: stretch; }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box { max-width: none; }

            .period-badge { display: none; }

            table { font-size: 0.75rem; }

            th, td { padding: 8px 6px; }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card { padding: 14px; }
            .stat-value { font-size: 1.25rem; }

            .switcher button { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Emoji Reactions Analysis</h1>
            <div class="switcher" id="switcher">
                <button class="active" data-file="emoji_analysis_all.csv" data-label="All Time">All Time</button>
                <button data-file="emoji_analysis_month_2026-02.csv" data-label="February 2026">Month</button>
                <button data-file="emoji_analysis_week_2026-02-23.csv" data-label="Week of Feb 23">Week</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="toolbar" id="toolbar" style="display:none;">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="filterInput" class="search-input" placeholder="Search user...">
            </div>
            <span class="period-badge" id="periodBadge">All Time</span>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <div id="content">
                    <div class="status-message">
                        <div class="spinner"></div>
                        <div>Loading data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tableData = [];
        let currentSort = { column: null, direction: 'desc' };
        let headers = [];
        let currentFile = 'emoji_analysis_all.csv';
        let currentLabel = 'All Time';

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadCSV(currentFile);
            setupSwitcher();
            document.getElementById('filterInput').addEventListener('input', e => {
                filterTable(e.target.value);
            });
        });

        function setupSwitcher() {
            document.querySelectorAll('.switcher button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.switcher button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFile = btn.dataset.file;
                    currentLabel = btn.dataset.label;
                    currentSort = { column: null, direction: 'desc' };
                    document.getElementById('filterInput').value = '';
                    document.getElementById('periodBadge').textContent = currentLabel;
                    document.getElementById('content').innerHTML = '<div class="status-message"><div class="spinner"></div><div>Loading data...</div></div>';
                    loadCSV(currentFile);
                });
            });
        }

        function loadCSV(filename) {
            fetch(filename)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.text();
                })
                .then(text => parseCSV(text))
                .catch(err => showError('Failed to load ' + filename, err.message));
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length < 2) {
                showError('Empty CSV', 'No data rows found.');
                return;
            }

            headers = parseCSVLine(lines[0]);
            tableData = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const row = {};
                    headers.forEach((h, idx) => { row[h] = values[idx]; });
                    tableData.push(row);
                }
            }

            if (!tableData.length) {
                showError('No data', 'CSV has headers but no data rows.');
                return;
            }

            // Default sort by reactions_count desc
            const reactIdx = headers.indexOf('reactions_count');
            if (reactIdx !== -1) {
                currentSort = { column: reactIdx, direction: 'desc' };
                sortData(reactIdx, 'desc');
            }

            displayStats();
            displayTable();
            document.getElementById('toolbar').style.display = 'flex';
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') inQuotes = !inQuotes;
                else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += ch;
            }
            result.push(current.trim());
            return result;
        }

        function displayStats() {
            const total = tableData.length;
            const msgs = tableData.reduce((s, r) => s + parseFloat(r.message_count || 0), 0);
            const reacts = tableData.reduce((s, r) => s + parseFloat(r.reactions_count || 0), 0);
            const avg = msgs > 0 ? (reacts / msgs).toFixed(2) : '0';

            document.getElementById('stats').innerHTML = [
                { label: 'Users', value: total },
                { label: 'Messages', value: msgs.toLocaleString() },
                { label: 'Reactions', value: reacts.toLocaleString() },
                { label: 'Avg Rate', value: avg }
            ].map(s => `
                <div class="stat-card">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${s.value}</div>
                </div>
            `).join('');
        }

        function getEmojiColumns() {
            return headers.filter(h => /[\u{1F300}-\u{1FAFF}]/u.test(h));
        }

        function getMaxForColumn(col) {
            let max = 0;
            tableData.forEach(r => {
                const v = parseFloat(r[col] || 0);
                if (v > max) max = v;
            });
            return max;
        }

        function heatClass(value, max) {
            if (value === 0) return 'zero';
            const ratio = value / max;
            if (ratio >= 0.7) return 'heat-4';
            if (ratio >= 0.4) return 'heat-3';
            if (ratio >= 0.15) return 'heat-2';
            return 'heat-1';
        }

        function displayTable(filteredData) {
            const data = filteredData || tableData;
            if (!data.length) {
                document.getElementById('content').innerHTML = '<div class="status-message">No matching results</div>';
                return;
            }

            const emojiCols = new Set(getEmojiColumns());
            const colMaxes = {};
            emojiCols.forEach(col => { colMaxes[col] = getMaxForColumn(col); });

            let html = '<table><thead><tr>';
            html += '<th class="col-rank">#</th>';

            headers.forEach((h, i) => {
                const sortClass = currentSort.column === i ? `sort-${currentSort.direction}` : '';
                const arrow = currentSort.column === i
                    ? (currentSort.direction === 'asc' ? '&#9650;' : '&#9660;')
                    : '&#8597;';
                const isEmoji = emojiCols.has(h);
                html += `<th class="${sortClass}" onclick="sortTable(${i})">${esc(h)}<span class="sort-icon">${arrow}</span></th>`;
            });

            html += '</tr></thead><tbody>';

            data.forEach((row, ri) => {
                html += '<tr>';
                html += `<td class="col-rank">${ri + 1}</td>`;

                headers.forEach(h => {
                    const val = row[h] || '';
                    const isEmoji = emojiCols.has(h);
                    const isRate = h.includes('rate');
                    const isName = h === 'user_name';

                    if (isName) {
                        html += `<td class="col-name">${esc(val)}</td>`;
                    } else if (isRate) {
                        html += `<td class="col-rate">${val ? parseFloat(val).toFixed(2) : '-'}</td>`;
                    } else if (isEmoji) {
                        const num = parseInt(val) || 0;
                        const cls = heatClass(num, colMaxes[h]);
                        html += `<td class="col-emoji ${cls}">${num === 0 ? '·' : num}</td>`;
                    } else {
                        const num = parseFloat(val);
                        if (!isNaN(num)) {
                            html += `<td class="col-number">${val}</td>`;
                        } else {
                            html += `<td>${esc(val)}</td>`;
                        }
                    }
                });

                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
        }

        function sortData(colIdx, dir) {
            const col = headers[colIdx];
            tableData.sort((a, b) => {
                let aV = a[col] || '';
                let bV = b[col] || '';
                const aN = parseFloat(aV);
                const bN = parseFloat(bV);
                if (!isNaN(aN) && !isNaN(bN)) {
                    return dir === 'asc' ? aN - bN : bN - aN;
                }
                aV = String(aV).toLowerCase();
                bV = String(bV).toLowerCase();
                return dir === 'asc' ? aV.localeCompare(bV) : bV.localeCompare(aV);
            });
        }

        function sortTable(colIdx) {
            if (currentSort.column === colIdx) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = colIdx;
                currentSort.direction = 'desc';
            }

            sortData(colIdx, currentSort.direction);

            const filterVal = document.getElementById('filterInput').value;
            filterTable(filterVal);
        }

        function filterTable(term) {
            term = (term || '').toLowerCase().trim();
            if (!term) { displayTable(); return; }
            displayTable(tableData.filter(r => (r.user_name || '').toLowerCase().includes(term)));
        }

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showError(title, details) {
            document.getElementById('content').innerHTML = `
                <div class="status-message error">
                    <strong>${esc(title)}</strong><br>
                    <span style="font-size:0.875rem">${esc(details)}</span>
                </div>`;
        }
    </script>
</body>
</html>
