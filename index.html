<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Reactions Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #e5e5e5;
            --text-secondary: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Period Switcher */
        .switcher {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            gap: 2px;
        }

        .switcher button {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .switcher button:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .switcher button.active {
            background: var(--accent);
            color: #fff;
        }

        /* Dropdown wrapper */
        .switcher-dropdown {
            position: relative;
        }

        .switcher-dropdown .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 180px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .switcher-dropdown.open .dropdown-menu {
            display: block;
        }

        .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 400;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .dropdown-menu button:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .dropdown-menu button.selected {
            background: var(--accent);
            color: #fff;
            font-weight: 500;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-box {
            flex: 1;
            max-width: 320px;
            position: relative;
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .period-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            margin-left: auto;
        }

        /* Table */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: scroll;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: var(--surface);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: color 0.15s;
        }

        th:hover {
            color: var(--text);
        }

        th .sort-icon {
            opacity: 0.3;
            margin-left: 4px;
            font-size: 0.7em;
        }

        th.sort-asc .sort-icon,
        th.sort-desc .sort-icon {
            opacity: 1;
            color: var(--accent);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: var(--surface-hover);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .col-rank {
            color: var(--text-secondary);
            font-size: 0.75rem;
            width: 40px;
            text-align: center;
        }

        .col-name {
            font-weight: 500;
            min-width: 140px;
        }

        .col-number {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .col-rate {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            font-weight: 500;
        }

        .col-emoji {
            text-align: center;
            font-size: 1rem;
        }

        /* Emoji column stripe backgrounds */
        .emoji-stripe-even { background: rgba(255,255,255, 0.015); }
        .emoji-stripe-odd  { background: rgba(255,255,255, 0.04); }
        tbody tr:hover .emoji-stripe-even { background: rgba(255,255,255, 0.04); }
        tbody tr:hover .emoji-stripe-odd  { background: rgba(255,255,255, 0.065); }
        th.emoji-stripe-even { background: #161616; }
        th.emoji-stripe-odd  { background: #1c1c1c; }

        .zero {
            color: #333;
        }

        .heat-1 { color: #555; }
        .heat-2 { color: #888; }
        .heat-3 { color: #a3a3a3; }
        .heat-4 { color: #eab308; }
        .heat-5 { color: #f59e0b; font-weight: 500; }
        .heat-6 { color: #f97316; font-weight: 600; }
        .heat-7 { color: #ef4444; font-weight: 700; }

        /* Dark scrollbar */
        .table-scroll,
        .top-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #333 #141414;
        }
        .table-scroll::-webkit-scrollbar,
        .top-scrollbar::-webkit-scrollbar {
            height: 10px;
        }
        .table-scroll::-webkit-scrollbar-track,
        .top-scrollbar::-webkit-scrollbar-track {
            background: #141414;
        }
        .table-scroll::-webkit-scrollbar-thumb,
        .top-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }
        .table-scroll::-webkit-scrollbar-thumb:hover,
        .top-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Top scrollbar */
        .top-scrollbar {
            overflow-x: scroll;
            overflow-y: hidden;
        }

        .top-scrollbar-inner {
            height: 1px;
        }

        /* Loading / Error */
        .status-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .status-message.error {
            color: #ef4444;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }

            .header { flex-direction: column; align-items: stretch; }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box { max-width: none; }

            .period-badge { margin-left: 0; }

            table { font-size: 0.75rem; }

            th, td { padding: 8px 6px; }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card { padding: 14px; }
            .stat-value { font-size: 1.25rem; }

            .switcher button { padding: 6px 12px; font-size: 0.8rem; }

            .switcher-dropdown .dropdown-menu {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Emoji Reactions Analysis</h1>
            <div class="switcher" id="switcher">
                <button class="active" data-file="emoji_analysis_all.csv" data-label="All Time">All Time</button>
                <div class="switcher-dropdown" id="monthDropdown">
                    <button class="switcher-toggle" data-group="month">Month ▾</button>
                    <div class="dropdown-menu" id="monthMenu"></div>
                </div>
                <div class="switcher-dropdown" id="weekDropdown">
                    <button class="switcher-toggle" data-group="week">Week ▾</button>
                    <div class="dropdown-menu" id="weekMenu"></div>
                </div>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="toolbar" id="toolbar" style="display:none;">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="filterInput" class="search-input" placeholder="Search user...">
            </div>
            <span class="period-badge" id="periodBadge">All Time</span>
        </div>

        <div class="table-container">
            <div class="top-scrollbar" id="topScrollbar">
                <div class="top-scrollbar-inner" id="topScrollbarInner"></div>
            </div>
            <div class="table-scroll" id="tableScroll">
                <div id="content">
                    <div class="status-message">
                        <div class="spinner"></div>
                        <div>Loading data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tableData = [];
        let currentSort = { column: null, direction: 'desc' };
        let headers = [];
        let currentFile = 'emoji_analysis_all.csv';
        let currentLabel = 'All Time';

        // Dynamic file discovery settings
        const DISCOVERY_START = '2025-01'; // earliest year-month to probe

        const MONTH_NAMES = ['January','February','March','April','May','June',
                             'July','August','September','October','November','December'];

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            await discoverFiles();
            loadCSV(currentFile);
            setupSwitcher();
            document.getElementById('filterInput').addEventListener('input', e => {
                filterTable(e.target.value);
            });
        });

        // Probe the server for existing CSV files and populate dropdowns
        async function discoverFiles() {
            const monthMenu = document.getElementById('monthMenu');
            const weekMenu = document.getElementById('weekMenu');

            const now = new Date();
            const startYear = parseInt(DISCOVERY_START.split('-')[0]);
            const startMonth = parseInt(DISCOVERY_START.split('-')[1]);

            // --- Discover month files ---
            const monthCandidates = [];
            for (let y = startYear; y <= now.getFullYear(); y++) {
                const mStart = (y === startYear) ? startMonth : 1;
                const mEnd = (y === now.getFullYear()) ? now.getMonth() + 1 : 12;
                for (let m = mStart; m <= mEnd; m++) {
                    const key = `${y}-${String(m).padStart(2, '0')}`;
                    const file = `emoji_analysis_month_${key}.csv`;
                    const label = `${MONTH_NAMES[m - 1]} ${y}`;
                    monthCandidates.push({ file, label });
                }
            }

            // --- Discover week files (probe every Monday from start to now) ---
            const weekCandidates = [];
            const d = new Date(startYear, startMonth - 1, 1);
            // Move to first Monday
            while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
            while (d <= now) {
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const file = `emoji_analysis_week_${key}.csv`;
                const mName = MONTH_NAMES[d.getMonth()].slice(0, 3);
                const label = `Week of ${mName} ${d.getDate()}`;
                weekCandidates.push({ file, label });
                d.setDate(d.getDate() + 7);
            }

            // Probe all candidates in parallel using HEAD requests
            async function probeExists(filename) {
                try {
                    const r = await fetch(filename, { method: 'HEAD' });
                    return r.ok;
                } catch { return false; }
            }

            const [monthResults, weekResults] = await Promise.all([
                Promise.all(monthCandidates.map(async c => ({ ...c, exists: await probeExists(c.file) }))),
                Promise.all(weekCandidates.map(async c => ({ ...c, exists: await probeExists(c.file) }))),
            ]);

            // Populate month dropdown (newest first)
            monthResults.filter(c => c.exists).reverse().forEach(m => {
                const btn = document.createElement('button');
                btn.textContent = m.label;
                btn.dataset.file = m.file;
                btn.dataset.label = m.label;
                monthMenu.appendChild(btn);
            });

            // Populate week dropdown (newest first)
            weekResults.filter(c => c.exists).reverse().forEach(w => {
                const btn = document.createElement('button');
                btn.textContent = w.label;
                btn.dataset.file = w.file;
                btn.dataset.label = w.label;
                weekMenu.appendChild(btn);
            });

            // Hide dropdowns that have no items
            if (!monthMenu.children.length) document.getElementById('monthDropdown').style.display = 'none';
            if (!weekMenu.children.length) document.getElementById('weekDropdown').style.display = 'none';
        }

        function setupSwitcher() {
            const allTimeBtn = document.querySelector('#switcher > button');
            const monthDropdown = document.getElementById('monthDropdown');
            const weekDropdown = document.getElementById('weekDropdown');
            const monthToggle = monthDropdown.querySelector('.switcher-toggle');
            const weekToggle = weekDropdown.querySelector('.switcher-toggle');

            function clearActive() {
                allTimeBtn.classList.remove('active');
                monthToggle.classList.remove('active');
                weekToggle.classList.remove('active');
                document.querySelectorAll('.dropdown-menu button.selected').forEach(b => b.classList.remove('selected'));
            }

            function closeAllDropdowns() {
                monthDropdown.classList.remove('open');
                weekDropdown.classList.remove('open');
            }

            function selectFile(file, label) {
                currentFile = file;
                currentLabel = label;
                currentSort = { column: null, direction: 'desc' };
                document.getElementById('filterInput').value = '';
                document.getElementById('periodBadge').textContent = currentLabel;
                document.getElementById('content').innerHTML = '<div class="status-message"><div class="spinner"></div><div>Loading data...</div></div>';
                loadCSV(currentFile);
            }

            // All Time button
            allTimeBtn.addEventListener('click', () => {
                closeAllDropdowns();
                clearActive();
                allTimeBtn.classList.add('active');
                monthToggle.textContent = 'Month ▾';
                weekToggle.textContent = 'Week ▾';
                selectFile(allTimeBtn.dataset.file, allTimeBtn.dataset.label);
            });

            // Month toggle
            monthToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const wasOpen = monthDropdown.classList.contains('open');
                closeAllDropdowns();
                if (!wasOpen) monthDropdown.classList.add('open');
            });

            // Week toggle
            weekToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const wasOpen = weekDropdown.classList.contains('open');
                closeAllDropdowns();
                if (!wasOpen) weekDropdown.classList.add('open');
            });

            // Month menu items
            document.getElementById('monthMenu').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                closeAllDropdowns();
                clearActive();
                monthToggle.classList.add('active');
                btn.classList.add('selected');
                monthToggle.textContent = btn.dataset.label + ' ▾';
                weekToggle.textContent = 'Week ▾';
                selectFile(btn.dataset.file, btn.dataset.label);
            });

            // Week menu items
            document.getElementById('weekMenu').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                closeAllDropdowns();
                clearActive();
                weekToggle.classList.add('active');
                btn.classList.add('selected');
                weekToggle.textContent = btn.dataset.label + ' ▾';
                monthToggle.textContent = 'Month ▾';
                selectFile(btn.dataset.file, btn.dataset.label);
            });

            // Close dropdowns on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.switcher-dropdown')) {
                    closeAllDropdowns();
                }
            });
        }

        function loadCSV(filename) {
            fetch(filename)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.text();
                })
                .then(text => parseCSV(text))
                .catch(err => showError('Failed to load ' + filename, err.message));
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length < 2) {
                showError('Empty CSV', 'No data rows found.');
                return;
            }

            headers = parseCSVLine(lines[0]);
            tableData = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const row = {};
                    headers.forEach((h, idx) => { row[h] = values[idx]; });
                    tableData.push(row);
                }
            }

            if (!tableData.length) {
                showError('No data', 'CSV has headers but no data rows.');
                return;
            }

            // Default sort by reactions_count desc
            const reactIdx = headers.indexOf('reactions_count');
            if (reactIdx !== -1) {
                currentSort = { column: reactIdx, direction: 'desc' };
                sortData(reactIdx, 'desc');
            }

            displayStats();
            displayTable();
            document.getElementById('toolbar').style.display = 'flex';
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') inQuotes = !inQuotes;
                else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += ch;
            }
            result.push(current.trim());
            return result;
        }

        function displayStats() {
            const total = tableData.length;
            const msgs = tableData.reduce((s, r) => s + parseFloat(r.message_count || 0), 0);
            const reacts = tableData.reduce((s, r) => s + parseFloat(r.reactions_count || 0), 0);
            const avg = msgs > 0 ? (reacts / msgs).toFixed(2) : '0';

            document.getElementById('stats').innerHTML = [
                { label: 'Users', value: total },
                { label: 'Memes', value: msgs.toLocaleString() },
                { label: 'Reactions', value: reacts.toLocaleString() },
                { label: 'Reactions/Memes Avg Rate', value: avg }
            ].map(s => `
                <div class="stat-card">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${s.value}</div>
                </div>
            `).join('');
        }

        const DATA_COLUMNS = new Set(['user_name', 'message_count', 'memes_count', 'reactions_count', 'reaction_rate_all']);

        // Rename message_count to memes_count in display
        const HEADER_RENAME = { 'message_count': 'memes_count' };

        function getEmojiColumns() {
            return headers.filter(h => !DATA_COLUMNS.has(h));
        }

        function heatClass(value) {
            if (value === 0) return 'zero';
            if (value === 1) return 'heat-1';
            if (value <= 3) return 'heat-2';
            if (value <= 7) return 'heat-3';
            if (value <= 15) return 'heat-4';
            if (value <= 30) return 'heat-5';
            if (value <= 80) return 'heat-6';
            return 'heat-7';
        }

        function displayTable(filteredData) {
            const data = filteredData || tableData;
            if (!data.length) {
                document.getElementById('content').innerHTML = '<div class="status-message">No matching results</div>';
                return;
            }

            const emojiCols = new Set(getEmojiColumns());

            // Build emoji stripe index (0-based counter for emoji cols only)
            let emojiIdx = 0;
            const emojiStripeMap = {};
            headers.forEach(h => {
                if (emojiCols.has(h)) {
                    emojiStripeMap[h] = emojiIdx++;
                }
            });

            let html = '<table><thead><tr>';
            html += '<th class="col-rank">#</th>';

            headers.forEach((h, i) => {
                const sortClass = currentSort.column === i ? `sort-${currentSort.direction}` : '';
                const arrow = currentSort.column === i
                    ? (currentSort.direction === 'asc' ? '&#9650;' : '&#9660;')
                    : '&#8597;';
                const stripe = emojiCols.has(h) ? (emojiStripeMap[h] % 2 === 0 ? 'emoji-stripe-even' : 'emoji-stripe-odd') : '';
                const displayName = HEADER_RENAME[h] || h;
                html += `<th class="${sortClass} ${stripe}" onclick="sortTable(${i})">${esc(displayName)}<span class="sort-icon">${arrow}</span></th>`;
            });

            html += '</tr></thead><tbody>';

            data.forEach((row, ri) => {
                html += '<tr>';
                html += `<td class="col-rank">${ri + 1}</td>`;

                headers.forEach(h => {
                    const val = row[h] || '';
                    const isEmoji = emojiCols.has(h);
                    const isRate = h.includes('rate');
                    const isName = h === 'user_name';
                    const stripe = isEmoji ? (emojiStripeMap[h] % 2 === 0 ? 'emoji-stripe-even' : 'emoji-stripe-odd') : '';

                    if (isName) {
                        html += `<td class="col-name">${esc(val)}</td>`;
                    } else if (isRate) {
                        html += `<td class="col-rate">${val ? parseFloat(val).toFixed(2) : '-'}</td>`;
                    } else if (isEmoji) {
                        const num = parseInt(val) || 0;
                        const cls = heatClass(num);
                        html += `<td class="col-emoji ${cls} ${stripe}">${num === 0 ? '·' : num}</td>`;
                    } else {
                        const num = parseFloat(val);
                        if (!isNaN(num)) {
                            html += `<td class="col-number">${val}</td>`;
                        } else {
                            html += `<td>${esc(val)}</td>`;
                        }
                    }
                });

                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
            syncTopScrollbar();
        }

        function sortData(colIdx, dir) {
            const col = headers[colIdx];
            tableData.sort((a, b) => {
                let aV = a[col] || '';
                let bV = b[col] || '';
                const aN = parseFloat(aV);
                const bN = parseFloat(bV);
                if (!isNaN(aN) && !isNaN(bN)) {
                    return dir === 'asc' ? aN - bN : bN - aN;
                }
                aV = String(aV).toLowerCase();
                bV = String(bV).toLowerCase();
                return dir === 'asc' ? aV.localeCompare(bV) : bV.localeCompare(aV);
            });
        }

        function sortTable(colIdx) {
            if (currentSort.column === colIdx) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = colIdx;
                currentSort.direction = 'desc';
            }

            sortData(colIdx, currentSort.direction);

            const filterVal = document.getElementById('filterInput').value;
            filterTable(filterVal);
        }

        function filterTable(term) {
            term = (term || '').toLowerCase().trim();
            if (!term) { displayTable(); return; }
            displayTable(tableData.filter(r => (r.user_name || '').toLowerCase().includes(term)));
        }

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showError(title, details) {
            document.getElementById('content').innerHTML = `
                <div class="status-message error">
                    <strong>${esc(title)}</strong><br>
                    <span style="font-size:0.875rem">${esc(details)}</span>
                </div>`;
        }

        // Sync top scrollbar width with table content
        function syncTopScrollbar() {
            setTimeout(() => {
                var ts = document.getElementById('tableScroll');
                var inn = document.getElementById('topScrollbarInner');
                if (ts && inn) {
                    inn.style.width = ts.scrollWidth + 'px';
                }
            }, 50);
        }

        (function() {
            const tableScroll = document.getElementById('tableScroll');
            const topBar = document.getElementById('topScrollbar');
            let syncing = false;

            topBar.addEventListener('scroll', () => {
                if (syncing) return;
                syncing = true;
                tableScroll.scrollLeft = topBar.scrollLeft;
                syncing = false;
            });

            tableScroll.addEventListener('scroll', () => {
                if (syncing) return;
                syncing = true;
                topBar.scrollLeft = tableScroll.scrollLeft;
                syncing = false;
            });
        })();
    </script>
</body>
</html>
